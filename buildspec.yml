# buildspec.yml — Playwright MCP Server
#
# CodeBuild reads this file to build and push the Playwright MCP Docker image.
# Built on ARM64 (Graviton) — consistent with the agent container.
#
# Flow:
#   GitHub push → CodePipeline detects → CodeBuild runs this file
#   → ARM64 Docker image built → pushed to ECR → ECS service updated

version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1
    IMAGE_REPO_NAME: prompt2test-playwright-mcp
  exported-variables:
    - PLAYWRIGHT_IMAGE_URI

phases:

  pre_build:
    commands:
      - echo "=== Logging in to Amazon ECR ==="
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_REGISTRY=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-8)
      - PLAYWRIGHT_IMAGE_URI=$ECR_REGISTRY/$IMAGE_REPO_NAME:$IMAGE_TAG
      - echo "Image will be tagged as $PLAYWRIGHT_IMAGE_URI"

  build:
    commands:
      - echo "=== Building Playwright MCP Docker image (ARM64) ==="
      - docker build -t $PLAYWRIGHT_IMAGE_URI -t $ECR_REGISTRY/$IMAGE_REPO_NAME:latest .
      - echo "Build completed"

  post_build:
    commands:
      - echo "=== Pushing image to ECR ==="
      - docker push $PLAYWRIGHT_IMAGE_URI
      - docker push $ECR_REGISTRY/$IMAGE_REPO_NAME:latest
      - echo "Push completed — $PLAYWRIGHT_IMAGE_URI"
      - printf '{"playwrightImageUri":"%s"}' $PLAYWRIGHT_IMAGE_URI > imageDetail.json

artifacts:
  files:
    - imageDetail.json
    - infra/**/*
    - buildspec.yml
